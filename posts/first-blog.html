<!DOCTYPE html>
<html lang="th">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เริ่มต้นการละเมอ | KueWa</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Sarabun', sans-serif; line-height: 1.8; color: #333; background-color: #ffffff; }
        
        /* Header แถบแดงเหมือนหน้าแรก */
        header { background-color: #ff0000; width: 100%; padding: 12px 0; text-align: center; }
        header h1 { color: white; font-size: 1.5rem; font-weight: 700; text-decoration: none; }
        header a { text-decoration: none; }

        .container { max-width: 700px; margin: 0 auto; padding: 40px 24px; }
        
        /* ปุ่มกลับหน้าหลัก */
        .back-link { display: inline-block; margin-bottom: 30px; color: #ff0000; text-decoration: none; font-size: 0.9rem; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }

        .article-header { margin-bottom: 40px; }
        .article-header h2 { font-size: 2.2rem; line-height: 1.3; font-weight: 500; font-style: italic; }
        .date { color: #aaa; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1px; }

        .content { font-size: 1.1rem; color: #444; }
        .content p { margin-bottom: 20px; }
        
        blockquote { border-left: 4px solid #ff0000; padding: 15px 25px; margin: 30px 0; background-color: #fff5f5; font-style: italic; }

</head>
<body>

    <header>
        <a href="../index.html"><h1>KueWa.</h1></a>

    <div class="container">
        <a href="../index.html" class="back-link">← กลับหน้าหลัก</a>
        
        <article>
            <div class="article-header">
                <span class="date">18 April 2026</span>
                <h2>คือว่า... ผมเริ่มทำบล็อกนี้เพื่ออะไร?</h2>
            </div>

            <div class="content">
                <p>ยินดีต้อนรับเข้าสู่บทความแรก!</p>
                <p>คือว่า... หลังจากที่หัวหมุนกับการสอบมานาน นี่ก็นั่งคิดว่าเราควรมีพื้นที่ไว้บ่นบ้าง</p>
                <blockquote>"เกือบตุย แต่ลุยมาได้"</blockquote>
                <p>ที่นี่จะเป็นที่ที่นี่จะมาแชร์เรื่องที่ได้ยิน ได้ฟัง ได้อ่านมา ผิดก็เชิญแหก</p>
            </div>
